<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Sign Up</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>Create Account </h1>

      <!-- USERNAME -->

      <input
        type="text"
        id="signupUsername"
        placeholder="Username"
        required
        autocomplete="username"
      >

      <!-- EMAIL -->

      <input
        type="email"
        id="signupEmail"
        placeholder="Email"
        required
        autocomplete="email"
      >

      <!-- PASSWORD -->

      <input
        type="password"
        id="signupPassword"
        placeholder="Password (min 8 chars)"
        required
        minlength="8"
        autocomplete="new-password"
      >

      <!-- SIGNUP BUTTON -->

      <button onclick="signup()">
        Sign Up
      </button>

      <!-- LOGIN LINK -->

      <p>
        Already have an account?
        <a href="login.html">
          Login
        </a>
      </p>

    </div>

  </div>

  <script src="auth.js"></script>

</body>
</html>
