<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="auth-container">

    <div class="auth-card">

      <h1>Welcome Back </h1>

      <!-- EMAIL -->

      <input
        type="email"
        id="loginEmail"
        placeholder="Enter Email"
        required
        autocomplete="email"
      >

      <!-- PASSWORD -->

      <input
        type="password"
        id="loginPassword"
        placeholder="Enter Password"
        required
        autocomplete="current-password"
      >

      <!-- LOGIN BUTTON -->

      <button onclick="login()">
        Login
      </button>

      <!-- SIGNUP LINK -->

      <p>
        Don't have an account?
        <a href="signup.html">
          Sign Up
        </a>
      </p>

    </div>

  </div>

  <script src="auth.js"></script>

</body>
</html>
